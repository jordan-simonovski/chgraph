- id: arch-django-http-hierarchy
  question: "Describe Django's HttpResponse class hierarchy: what is the base class and how do JsonResponse and HttpResponseRedirect fit in?"
  repo: django
  category: architecture
  key_points:
    - "HttpResponseBase is the root base class (django/http/response.py)"
    - "HttpResponse and StreamingHttpResponse both subclass HttpResponseBase"
    - "JsonResponse subclasses HttpResponse"
    - "HttpResponseRedirect subclasses HttpResponseRedirectBase, which subclasses HttpResponse"
  golden_set_version: 1
  provenance: {by: claude, verified: false, date: 2026-07-08, why: "architecture: cross-symbol hierarchy in one module"}

