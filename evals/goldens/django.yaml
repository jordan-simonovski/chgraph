- id: callercallee-django-get-object-or-404
  question: "How does django.shortcuts.get_object_or_404 perform its lookup and signal a missing object?"
  repo: django
  category: caller_callee
  key_points:
    - "it calls queryset.get(*args, **kwargs) to fetch the object (django/shortcuts.py)"
    - "it raises Http404 when the object does not exist"
    - "it derives the queryset from the passed model/manager/queryset (get_queryset helper)"
  golden_set_version: 1
  provenance: {by: claude, verified: false, date: 2026-07-08, why: "caller/callee: what a shortcut delegates to"}

- id: dataflow-django-middleware-chain
  question: "How does Django assemble and apply its middleware to an incoming request?"
  repo: django
  category: data_flow
  key_points:
    - "BaseHandler.load_middleware builds the chain (django/core/handlers/base.py)"
    - "each middleware is wrapped with convert_exception_to_response and stored as _middleware_chain"
    - "get_response calls self._middleware_chain(request) to run the request through the stack"
  golden_set_version: 1
  provenance: {by: claude, verified: false, date: 2026-07-08, why: "cross-file data flow: request path through middleware"}

- id: arch-django-atomic
  question: "What does django.db.transaction.atomic return, and what makes it usable as both a decorator and a context manager?"
  repo: django
  category: architecture
  key_points:
    - "atomic() returns an Atomic instance (django/db/transaction.py)"
    - "Atomic subclasses ContextDecorator, which is what lets it work as both a decorator and a context manager"
  golden_set_version: 1
  provenance: {by: claude, verified: false, date: 2026-07-08, why: "architecture: dual-use construct + base class"}
