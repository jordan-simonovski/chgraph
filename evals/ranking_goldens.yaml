# Ranking-eval goldens (git-evolution campaign Phase 6). query -> expected live symbol.
# STATUS: derived from django @318a316a; machine-verified 2026-07-08 against the live index
# (each expected qn present; staleness pairs confirmed same-name live/deprecated collisions;
# each general `dep-trap` confirmed flagged dep=1 yet correctly #1 under blind). verified:false
# until human sign-off per validation-and-qa §4.
#
# staleness (n=4): pool contains a stale near-duplicate of `expected`; recency alone can't
#            separate them (deprecate+replace landed in one commit). Tests the flagship thesis.
#            NOTE: the clean same-name twin family in django@318a316a is exactly the 4 postgres
#            aggregates below (only `class X(_X)` deprecation shims) — the set is exhausted, not
#            thin by neglect. More would need a different repo or a different staleness shape.
# general (n=10): canonical symbol ranks #1 under blind, no staleness angle. Over-demotion guard.
#            The 6 `dep-trap` entries are LIVE symbols whose body carries a deprecation marker
#            (they deprecate a param/method, not themselves) — the JsonResponse false-positive
#            class. The coarse body-regex prototype mis-flagged them; the parse-time detector
#            (ADR-0002, chgraph.parse_python) correctly leaves them dep=0, so they stay #1 at any
#            dep weight. They now guard against a future detector regression re-flagging them.
#            (`QuerySet` was the counter-case that forced parse-time detection: the regex flagged
#            it and a demotion ejected it from top-10; the parser now leaves it dep=0.)

